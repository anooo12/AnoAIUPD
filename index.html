<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0f0c29"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Astro"/>
  <link rel="manifest" href="manifest.json"/>
  <title>Astro</title>
  <style>
    :root {
      --bg1: #0f0c29; --bg2: #302b63; --bg3: #24243e;
      --purple: #7c3aed; --purple-light: #a78bfa;
      --text: #e2d9f3; --muted: #9f7aea;
      --border: rgba(167,139,250,0.2);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      font-family: Georgia, serif;
      color: var(--text);
    }

    /* ── APP SHELL ── */
    #app { position: fixed; top:0; left:0; right:0; bottom:0; display:flex; flex-direction:column; }

    /* ── HEADER ── */
    #header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: rgba(15,12,41,0.95);
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .brand { display:flex; align-items:center; gap:8px; }
    .brand-icon { font-size: 20px; }
    .brand-text h1 { font-size: 1rem; color: #e9d5ff; line-height:1.2; }
    .brand-text small { font-size: 0.65rem; color: var(--muted); }

    /* Model switch */
    .model-switch {
      display: flex; background: rgba(255,255,255,0.07);
      border-radius: 20px; padding: 3px; gap: 2px;
      border: 1px solid var(--border);
    }
    .model-btn {
      padding: 4px 10px; border-radius: 16px; border: none;
      font-size: 0.7rem; cursor: pointer; font-family: inherit;
      transition: all 0.2s; color: var(--muted); background: transparent;
    }
    .model-btn.active {
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      color: #fff;
    }

    /* Header actions */
    .header-actions { display:flex; gap:6px; }
    .icon-btn {
      width: 32px; height: 32px; border-radius: 8px; border: none;
      background: rgba(255,255,255,0.07); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer; font-size: 14px;
      display:flex; align-items:center; justify-content:center;
      transition: all 0.2s;
    }
    .icon-btn:active { transform: scale(0.9); }

    /* ── MESSAGES ── */
    #scroll-wrap {
      flex: 1; overflow-y: scroll; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    #messages {
      padding: 16px; display:flex; flex-direction:column;
      gap: 14px; min-height: 100%; justify-content: flex-end;
    }

    .msg { display:flex; }
    .msg.user { justify-content: flex-end; }
    .msg.bot { justify-content: flex-start; align-items: flex-end; gap: 8px; }

    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      display:flex; align-items:center; justify-content:center;
      font-size: 13px; flex-shrink: 0;
    }
    .avatar.gemini {
      background: linear-gradient(135deg, #1a73e8, #34a853);
    }

    .bubble {
      max-width: 78%; padding: 10px 14px;
      font-size: 0.88rem; line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
    }
    .bubble.user {
      background: linear-gradient(135deg, var(--purple), #6d28d9);
      color: #fff; border-radius: 18px 18px 4px 18px;
    }
    .bubble.bot {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 18px 18px 18px 4px;
    }
    .bubble img {
      max-width: 100%; border-radius: 10px; margin-bottom: 6px; display:block;
    }

    /* ── THINKING ANIMATION (kayak Claude) ── */
    .thinking {
      display: flex; align-items: center; gap: 8px; padding: 4px 0;
    }
    .thinking-text {
      font-size: 0.8rem; color: var(--muted);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    .stars-container { display:flex; gap:4px; align-items:center; }
    .star {
      font-size: 14px;
      animation: starSpin 1.5s infinite;
      display: inline-block;
    }
    .star:nth-child(1) { animation-delay: 0s; }
    .star:nth-child(2) { animation-delay: 0.3s; }
    .star:nth-child(3) { animation-delay: 0.6s; }
    @keyframes starSpin {
      0%   { transform: scale(0.5) rotate(0deg); opacity: 0.3; }
      50%  { transform: scale(1.2) rotate(180deg); opacity: 1; }
      100% { transform: scale(0.5) rotate(360deg); opacity: 0.3; }
    }

    /* ── INPUT AREA ── */
    #input-area {
      flex-shrink: 0;
      padding: 10px 16px 14px;
      background: rgba(15,12,41,0.95);
      border-top: 1px solid var(--border);
    }
    .input-row { display:flex; align-items:flex-end; gap:8px; }
    textarea {
      flex:1; background: rgba(255,255,255,0.07);
      border: 1px solid var(--border); border-radius: 20px;
      color: var(--text); padding: 10px 16px;
      font-size: 0.9rem; font-family: inherit; line-height: 1.5;
      max-height: 100px; resize: none; -webkit-appearance: none;
    }
    textarea:focus { outline:none; border-color: rgba(167,139,250,0.6); }
    textarea::placeholder { color: rgba(167,139,250,0.35); }

    .send-btn {
      width:40px; height:40px; border-radius:50%; border:none; flex-shrink:0;
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition: all 0.2s;
    }
    .send-btn:disabled { background: rgba(255,255,255,0.1); }
    .send-btn:active { transform: scale(0.92); }

    .attach-btn {
      width:40px; height:40px; border-radius:50%; border:none; flex-shrink:0;
      background: rgba(255,255,255,0.07); border: 1px solid var(--border);
      color: var(--muted); cursor:pointer; font-size:18px;
      display:flex; align-items:center; justify-content:center;
    }
    .attach-btn:active { transform: scale(0.92); }

    /* Image preview */
    #img-preview-wrap {
      display:none; margin-bottom:8px;
      position:relative; width:fit-content;
    }
    #img-preview { width:70px; height:70px; object-fit:cover; border-radius:10px; }
    #img-remove {
      position:absolute; top:-6px; right:-6px;
      width:18px; height:18px; border-radius:50%;
      background:#ef4444; border:none; color:#fff;
      font-size:11px; cursor:pointer; display:flex;
      align-items:center; justify-content:center;
    }

    /* ── HISTORY SIDEBAR ── */
    #sidebar {
      position:fixed; top:0; left:-280px; width:280px; height:100%;
      background: rgba(15,12,41,0.98); backdrop-filter:blur(20px);
      border-right: 1px solid var(--border);
      z-index:100; transition: left 0.3s ease;
      display:flex; flex-direction:column;
    }
    #sidebar.open { left:0; }
    #sidebar-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.5);
      z-index:99; display:none;
    }
    #sidebar-overlay.open { display:block; }

    .sidebar-header {
      padding:16px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .sidebar-header h2 { font-size:1rem; color:#e9d5ff; }
    .sidebar-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; }

    #history-list { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
    .history-item {
      padding:10px 12px; border-radius:10px;
      background:rgba(255,255,255,0.05); border:1px solid var(--border);
      cursor:pointer; font-size:0.82rem; color:var(--text);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      transition: background 0.2s;
    }
    .history-item:active { background:rgba(124,58,237,0.2); }
    .history-item .hist-model { font-size:0.68rem; color:var(--muted); margin-top:2px; }
    .history-empty { color:var(--muted); font-size:0.82rem; text-align:center; padding:20px; }

    .new-chat-btn {
      margin:12px; padding:10px; border-radius:10px; border:none;
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      color:#fff; font-size:0.85rem; font-family:inherit; cursor:pointer;
    }

    /* fade in */
    @keyframes fadeUp {
      from{opacity:0;transform:translateY(8px)}
      to{opacity:1;transform:translateY(0)}
    }
    .msg { animation: fadeUp 0.25s ease; }
  </style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <div id="header">
    <div class="brand">
      <span class="brand-icon">✨</span>
      <div class="brand-text">
        <h1 id="model-name">Astro 1.2</h1>
        <small id="model-sub">powered by Ano</small>
      </div>
    </div>
    <div class="model-switch">
      <button class="model-btn active" id="btn-12" onclick="switchModel('12')">1.2</button>
      <button class="model-btn" id="btn-20" onclick="switchModel('20')">2.0</button>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="newChat()" title="New Chat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button class="icon-btn" onclick="toggleSidebar()" title="Riwayat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- MESSAGES -->
  <div id="scroll-wrap">
    <div id="messages"></div>
  </div>

  <!-- INPUT -->
  <div id="input-area">
    <div id="img-preview-wrap">
      <img id="img-preview" src="" alt=""/>
      <button id="img-remove" onclick="removeImage()">✕</button>
    </div>
    <div class="input-row">
      <button class="attach-btn" onclick="document.getElementById('file-input').click()">📷</button>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImage(event)"/>
      <textarea id="input" rows="1" placeholder="Ketik pesan..."></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M5 12h14M12 5l7 7-7 7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div id="sidebar">
  <div class="sidebar-header">
    <h2>💬 Riwayat Chat</h2>
    <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
  </div>
  <button class="new-chat-btn" onclick="newChat();toggleSidebar()">+ New Chat</button>
  <div id="history-list"></div>
</div>

<script>
  // ── CONFIG ──
  const GROQ_KEY = "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";
  const GEMINI_KEY = "AIzaSyCzzT5NWfWeD8HkMUWSzoHfD2wV-Wdhm34";
  const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
  const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b:generateContent?key=${GEMINI_KEY}`;

  const SYSTEM_12 = `Kamu adalah Ano, asisten AI yang ramah dan helpful. Jawab dalam bahasa yang sama dengan pengguna. Jika ditanya siapa kamu, jawab kamu adalah Ano versi 1.2.`;
  const SYSTEM_20 = `Kamu adalah Ano versi 2.0, AI generasi terbaru yang sangat cerdas dan up-to-date. Kamu bisa melihat gambar. Jawab dalam bahasa yang sama dengan pengguna. Berikan jawaban yang mendalam dan akurat.`;

  let currentModel = '12';
  let history = [];
  let loading = false;
  let pendingImage = null; // {base64, mimeType}
  let allChats = JSON.parse(localStorage.getItem('astro_chats') || '[]');
  let currentChatId = Date.now();

  const scrollWrap = document.getElementById('scroll-wrap');
  const messagesEl = document.getElementById('messages');
  const textarea = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');

  function scrollBottom() {
    setTimeout(() => { scrollWrap.scrollTop = scrollWrap.scrollHeight; }, 60);
  }

  function esc(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function switchModel(m) {
    currentModel = m;
    document.getElementById('btn-12').classList.toggle('active', m==='12');
    document.getElementById('btn-20').classList.toggle('active', m==='20');
    document.getElementById('model-name').textContent = m==='12' ? 'Astro 1.2' : 'Astro 2.0';
    document.getElementById('model-sub').textContent = m==='12' ? 'powered by Ano · LLaMA' : 'powered by Ano · Gemini';
    // Update avatar color for future messages
  }

  function newChat() {
    // Save current chat if has messages
    if (history.length > 0) {
      const firstMsg = history.find(m => m.role === 'user');
      const title = firstMsg ? (firstMsg.content.substring(0,40) + (firstMsg.content.length>40?'...':'')) : 'Chat baru';
      const existing = allChats.findIndex(c => c.id === currentChatId);
      const chatData = { id: currentChatId, title, model: currentModel, history, time: Date.now() };
      if (existing >= 0) allChats[existing] = chatData;
      else allChats.unshift(chatData);
      localStorage.setItem('astro_chats', JSON.stringify(allChats.slice(0,30)));
    }
    history = [];
    currentChatId = Date.now();
    messagesEl.innerHTML = '';
    addMsg('bot', 'Halo! Aku Ano 👋 Mau tanya apa?');
    renderHistory();
  }

  function loadChat(id) {
    const chat = allChats.find(c => c.id === id);
    if (!chat) return;
    history = chat.history;
    currentChatId = chat.id;
    switchModel(chat.model);
    messagesEl.innerHTML = '';
    history.forEach(m => {
      if (m.role === 'user') addMsg('user', m.content, false, m.image);
      else addMsg('bot', m.content);
    });
    toggleSidebar();
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    if (allChats.length === 0) {
      list.innerHTML = '<div class="history-empty">Belum ada riwayat chat</div>';
      return;
    }
    list.innerHTML = allChats.map(c => `
      <div class="history-item" onclick="loadChat(${c.id})">
        ${esc(c.title)}
        <div class="hist-model">Astro ${c.model === '12' ? '1.2' : '2.0'} · ${new Date(c.time).toLocaleDateString('id')}</div>
      </div>
    `).join('');
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
    renderHistory();
  }

  function addMsg(role, content, isThinking=false, imageBase64=null) {
    const div = document.createElement('div');
    div.className = 'msg ' + (role==='user'?'user':'bot');
    if (isThinking) div.id = 'thinking-msg';

    const avatarClass = currentModel === '20' ? 'avatar gemini' : 'avatar';
    const avatarIcon = currentModel === '20' ? '✦' : '✨';

    if (role === 'bot') {
      let inner = '';
      if (isThinking) {
        inner = `<div class="thinking">
          <div class="stars-container">
            <span class="star">✦</span>
            <span class="star">✦</span>
            <span class="star">✦</span>
          </div>
          <span class="thinking-text">sedang berpikir...</span>
        </div>`;
      } else {
        inner = esc(content);
      }
      div.innerHTML = `<div class="${avatarClass}">${avatarIcon}</div><div class="bubble bot">${inner}</div>`;
    } else {
      let imgHtml = imageBase64 ? `<img src="${imageBase64}" alt="foto"/>` : '';
      div.innerHTML = `<div class="bubble user">${imgHtml}${esc(content)}</div>`;
    }
    messagesEl.appendChild(div);
    scrollBottom();
    return div;
  }

  function handleImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      pendingImage = { base64: ev.target.result, mimeType: file.type };
      document.getElementById('img-preview').src = ev.target.result;
      document.getElementById('img-preview-wrap').style.display = 'block';
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  function removeImage() {
    pendingImage = null;
    document.getElementById('img-preview-wrap').style.display = 'none';
    document.getElementById('img-preview').src = '';
  }

  // Auto resize textarea
  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
  });
  textarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  async function sendMessage() {
    const text = textarea.value.trim();
    if ((!text && !pendingImage) || loading) return;
    loading = true;
    sendBtn.disabled = true;
    textarea.value = '';
    textarea.style.height = 'auto';

    const imgData = pendingImage;
    removeImage();

    // Add to UI
    addMsg('user', text || '📷 Foto', false, imgData?.base64);
    addMsg('bot', '', true);

    // Add to history
    history.push({ role:'user', content: text || 'Jelaskan gambar ini', image: imgData?.base64 });

    try {
      let reply = '';
      if (currentModel === '12') {
        reply = await callGroq(text || 'Jelaskan gambar ini');
      } else {
        reply = await callGemini(text || 'Jelaskan gambar ini', imgData);
      }

      history.push({ role:'assistant', content: reply });

      const t = document.getElementById('thinking-msg');
      if (t) { t.querySelector('.bubble').innerHTML = esc(reply); t.removeAttribute('id'); }
    } catch(err) {
      const t = document.getElementById('thinking-msg');
      if (t) { t.querySelector('.bubble').innerHTML = '⚠️ Error: ' + err.message; t.removeAttribute('id'); }
      history.pop();
    } finally {
      loading = false;
      sendBtn.disabled = false;
      scrollBottom();
    }
  }

  async function callGroq(text) {
    const res = await fetch(GROQ_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
      body: JSON.stringify({
        model:'llama-3.3-70b-versatile', max_tokens:1000,
        messages:[{role:'system',content:SYSTEM_12},...history.map(m=>({role:m.role==='assistant'?'assistant':'user',content:m.content}))]
      })
    });
    const data = await res.json();
    return data.choices?.[0]?.message?.content || 'Maaf, tidak bisa menjawab.';
  }

  async function callGemini(text, imgData) {
    // Build contents from history
    const contents = [];

    // Add previous history
    for (const m of history.slice(0, -1)) {
      const role = m.role === 'assistant' ? 'model' : 'user';
      const parts = [];
      if (m.image) parts.push({ inline_data: { mime_type: 'image/jpeg', data: m.image.split(',')[1] }});
      parts.push({ text: m.content || ' ' });
      contents.push({ role, parts });
    }

    // Add current message
    const currentParts = [];
    if (imgData) currentParts.push({ inline_data: { mime_type: imgData.mimeType, data: imgData.base64.split(',')[1] }});
    currentParts.push({ text: text || 'Jelaskan gambar ini' });
    contents.push({ role: 'user', parts: currentParts });

    // Inject system as first user message for v1
    const fullContents = [
      { role: 'user', parts: [{ text: SYSTEM_20 }] },
      { role: 'model', parts: [{ text: 'Baik, saya siap membantu!' }] },
      ...contents
    ];

    const res = await fetch(GEMINI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: fullContents })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.candidates?.[0]?.content?.parts?.[0]?.text || 'Maaf, tidak bisa menjawab.';
  }

  // Init
  addMsg('bot', 'Halo! Aku Ano 👋 Mau tanya apa?\n\nKamu bisa switch ke Astro 2.0 untuk AI yang lebih pintar dan bisa analisis foto! 📷');

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
